# A distinct project name so `docker compose -f compose.e2e.yaml` and `docker compose`
# (compose.yaml, i.e. `npm start`) are treated as fully independent stacks. Without this,
# both files define services named "app"/"db"/"redis" under the same default project
# ("apparaatti", from the directory name), so Compose treats them as the *same* services -
# running one after the other doesn't just leave two stacks side by side, it recreates and
# replaces the other stack's containers with this file's config.
name: apparaatti_e2e

services:
  app:
    build:
      context: ./
      dockerfile: dev.Containerfile
    image: apparaatti_dev
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres
      - PORT=8000
      - IN_E2E=true
      - TEST_CURRENT_DATE=2026-02-20
      - NODE_ENV=test
    volumes:
      - ./:/opt/app-root/src
    ports:
      - 3001:3000
      - 8001:8000
    container_name: apparaatti_e2e
    networks:
      - localhost-network
    depends_on:
      - db
      - redis

  db:
    image: docker.io/postgres:15.8-alpine
    environment:
      - PGDATA=/data
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5434:5432
    volumes:
      - pg_data_e2e:/data
    container_name: apparaatti_e2e_db
    networks:
      - localhost-network

  redis:
    image: redis:7-alpine
    container_name: apparaatti_e2e_redis
    networks:
      - localhost-network

networks:
  localhost-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: '127.0.0.1'
volumes:
  pg_data_e2e:

name: Deploy to staging

on:
  push:
    branches:
      - master

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      - name: Verify safe-chain
        run: npm safe-chain-verify --delay 7d

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run lint
        run: npm run lint:all

      - name: Run tsc
        run: npm run tsc

      - name: Run tests
        run: npm run test -- --run

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      - name: Verify safe-chain
        run: npm safe-chain-verify --delay 7d

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run e2e

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint-and-test, e2e-tests]

    steps:
      - uses: actions/checkout@v5

      - name: Build staging image
        id: build-staging-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: apparaatti
          tags: staging ${{ github.sha }}
          containerfiles: |
            ./Containerfile
          build-args: |
            GIT_SHA=${{ github.sha }}
            IMAGE_SHA=${{ github.sha }}
            RELEASE_VERSION=${{ github.ref_name }}
            STAGING=true
          # Extra args are needed to increase the number of open files
          # because of build EMFILE error: https://github.com/npm/cli/issues/4783#issuecomment-1908016260
          extra-args: |
            --ulimit nofile=4096:4096
      - name: Push staging image to quay.io
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-staging-image.outputs.image }}
          tags: ${{ steps.build-staging-image.outputs.tags }}
          registry: quay.io/toska
          username: toska+github
          password: ${{ secrets.QUAY_IO_TOKEN }}
